name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: smoke test
        shell: bash
        run: |
          node dist/cli.js --version
          node dist/cli.js --help | head -1
          CLAUDE_ACCOUNTS_DIR=/tmp/cca-ci node dist/cli.js list
